services:
  auth-idp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SNODEC_REPO: https://github.com/jan-eberwein/snode.c.git
        SNODEC_BRANCH: sso-mfa-authentication
    image: auth-idp:latest
    container_name: auth-idp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # ── Server ──────────────────────────────────────────────────────
      - IDP_PORT=8080
      - IDP_BASE_URL=${IDP_BASE_URL:-https://auth.janeberwein.at}
      - IDP_ISSUER=${IDP_ISSUER:-https://auth.janeberwein.at}
      # ── Paths ───────────────────────────────────────────────────────
      - IDP_PRIVATE_KEY_PATH=/app/keys/private_key.pem
      - IDP_PUBLIC_KEY_PATH=/app/keys/public_key.pem
      - DB_PATH=/app/data/auth.db
      # ── Security ────────────────────────────────────────────────────
      - TOTP_KEY_PATH=${TOTP_KEY_PATH:-}
      - IDP_ALLOWED_REDIRECT_URIS=${IDP_ALLOWED_REDIRECT_URIS:-}
      - SETUP_CLAIM_TOKEN=${SETUP_CLAIM_TOKEN:-}
      # ── Federated Login (optional) ───────────────────────────────────
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_APPLE_CLIENT_ID=${OAUTH_APPLE_CLIENT_ID:-}
      - OAUTH_APPLE_CLIENT_SECRET=${OAUTH_APPLE_CLIENT_SECRET:-}
      - OAUTH_META_CLIENT_ID=${OAUTH_META_CLIENT_ID:-}
      - OAUTH_META_CLIENT_SECRET=${OAUTH_META_CLIENT_SECRET:-}
      # ── SMTP ────────────────────────────────────────────────────────
      - SMTP_COMMAND=${SMTP_COMMAND:-}
    volumes:
      # Persistent data (survives container restarts and upgrades)
      - auth_keys:/app/keys
      - auth_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  auth_keys:
    driver: local
  auth_data:
    driver: local
